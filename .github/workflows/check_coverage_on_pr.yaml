name: Check coverage on PR
# Fonctionnement du workflow:
# - Lorsqu'une PR est ouverte, le workflow vérifie le code coverage des tests.
# - Si le code coverage est inférieur à 50%, le workflow ajoute un label "not enough tests" à la PR.
# - Si le code coverage est supérieur ou égal à 50%, le workflow retire le label "not enough tests" de la PR (s'il était présent).
on:
  pull_request:

permissions:
  contents: read
  # Nécessaire pour créer/ajouter/retirer le label sur la PR via gh
  pull-requests: write

jobs:
  coverage:
    name: Check code coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      # Exécute les tests avec cargo-tarpaulin et génère un rapport de couverture au format JSON.
      # Le pourcentage de couverture est ensuite stocké dans la variable d'environnement COVERAGE avec la commande jq pour extraire la valeur de 'coverage' du fichier json.
      - name: Run tests with cargo-tarpaulin
        id: tarpaulin
        run: |
          cargo tarpaulin --workspace --out Json --output-dir .
          COVERAGE=$(jq -r '.coverage' tarpaulin-report.json)
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"
          echo "Total coverage: ${COVERAGE}%"

      - name: Label PR if coverage is below 50%
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COVERAGE: ${{ steps.tarpaulin.outputs.coverage }}
        run: |
          set -euo pipefail

          LABEL="not enough tests"

          # Crée le label (si déjà existant, l'erreur est avalée par || true)
          gh label create "${LABEL}" --color "e11d48" --description "Code coverage below 50%" || true

          IS_BELOW=$(python -c "print(1 if ${COVERAGE} < 50.0 else 0)")
          if [[ "${IS_BELOW}" == "1" ]]; then
            echo "Coverage ${COVERAGE}% is below 50% — adding label '${LABEL}'"
            gh pr edit "${PR_NUMBER}" --add-label "${LABEL}"
          else
            echo "Coverage ${COVERAGE}% is sufficient — removing label '${LABEL}' if present"
            gh pr edit "${PR_NUMBER}" --remove-label "${LABEL}" || true
          fi
