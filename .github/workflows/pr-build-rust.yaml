name: Build / Test / Format / Documentation
# Trois jobs indépendants et parallèles : formatage, build/tests multi-OS, et génération de la doc.

on:
  workflow_call:

env:
  # Rajoute des couleurs dans les logs cargo
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Composant nécessaire pour la commande `cargo fmt`
          components: rustfmt

      - name: Check formatting
        # --check ne modifie rien, échoue simplement si le code n'est pas déjà formaté
        run: cargo fmt --check

  rust:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast: false permet de voir les résultats sur tous les OS même si l'un d'eux échoue
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [1.88.0]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          # Composant nécessaire pour la commande `cargo clippy`
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Clé unique par OS/toolchain/Cargo.lock : un changement de dépendances invalide le cache
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          # Clés de repli utilisées si aucune correspondance exacte n'est trouvée, pour profiter
          # quand même d'un cache partiel (registre déjà téléchargé par exemple)
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.toolchain }}
            ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --release --verbose

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Typst
        # Nécessaire pour compiler le manuel utilisateur (.typ → .pdf) via `make doc`
        uses: typst-community/setup-typst@v5

      - name: Build documentation
        run: make doc

      - uses: actions/upload-artifact@v7
        with:
          name: manuel-utilisateur
          path: doc/manuel_utilisateur.pdf
