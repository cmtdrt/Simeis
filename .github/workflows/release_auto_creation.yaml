# Quand une PR est mergée sur une branche release/x, on crée ou met à jour la release qui correspond
# Ou quand une branche release/* est créée
name: Release auto creation

on:
  pull_request:
    # Déclenché à la fermeture de la PR (branche mergée ou fermée — on vérifie si c'est bien un merge plus bas.
    types: [closed]
    # Seulement pour les branches release/*
    branches:
      - 'release/**'
  create:

permissions:
  # Nécessaire pour créer le tag et publier la release.
  contents: write
  # Nécessaire pour lister et lire les Pull Requests
  pull-requests: read

jobs:
  release:
    name: Créer ou mettre à jour la release
    runs-on: ubuntu-latest
    # S'assurer que la PR est bien mergée (et pas juste fermée), ou que c'est bien une branche release/* qui est créée
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true) ||
      (github.event_name == 'create' &&
       startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          # Nécessaire pour bien récupérer la valeur de target_commit (sha du commit mergé)
          # En mettant 0 on récupère l'historique complet du dépôt, pour être sur de récupérer le commit mergé.
          fetch-depth: 0
          # S'assurer d'être sur la branche de destination (release/x)
          ref: ${{ github.event_name == 'create' && github.ref_name || github.event.pull_request.base.ref }}

      - name: Extraire la version depuis la branche cible
        id: version
        run: |
          # Objectif : extraire la version de la branche (release/0.0.1 → 0.0.1)
          # On récupère le nom de la branche (release/0.0.1)
          if [ "${{ github.event_name }}" = "create" ]; then
            branch_name="${{ github.ref_name }}"
          else
            branch_name="${{ github.event.pull_request.base.ref }}"
          fi
          # On retire le préfixe "release/" pour ne garder que la version (note: on aurait pu tout faire en une ligne)
          version="${branch_name#release/}"
          # Rendre la version accesssible pour le job suivant via ${{ steps.version.outputs.version }}
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Générer le changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "create" ]; then
            branch_name="${{ github.ref_name }}"
          else
            branch_name="${{ github.event.pull_request.base.ref }}"
          fi
          echo "Récupération des PRs mergées sur $branch_name..."
          
          # On récupère la liste des PRs en séparant les informations par un pipe "|" : nom_de_branche|titre|url avec une limite de 100 PRs
          prs_infos=$(gh pr list --state merged --base "$branch_name" --repo "${{ github.repository }}" --limit 100 --json headRefName,title,url --template '{{range .}}{{printf "%s|%s|%s\n" .headRefName .title .url}}{{end}}')
          
          # features sera toujours vide parce que les règles bloquent les PRs feature sur la branche release (les features doivent passer par main)
          features=""
          bugs=""
          autres=""
          
          # On lit le texte ligne par ligne en coupant à chaque pipe (IFS='|')
          while IFS='|' read -r head_ref title url; do
            if [ -z "$title" ]; then continue; fi
            
            # On crée la ligne à afficher
            ligne="- $title ($url)"
            
            # Tri par catégorie selon le nom de la branche d'origine
            if [[ "$head_ref" == feature/* ]]; then
              features="$features$ligne"$'\n'
            elif [[ "$head_ref" == bug/* ]] || [[ "$head_ref" == propagate/* ]]; then
              bugs="$bugs$ligne"$'\n'
            else
              autres="$autres$ligne"$'\n'
            fi
          done <<< "$prs_infos"
          
          # Construction du texte final
          changelog="## Changelog"$'\n'
          if [ -n "$features" ]; then changelog="$changelog"$'\n'"### Features"$'\n'"$features"; fi
          if [ -n "$bugs" ]; then changelog="$changelog"$'\n'"### Bugfix"$'\n'"$bugs"; fi
          if [ -n "$autres" ];   then changelog="$changelog"$'\n'"### Autre(s)"$'\n'"$autres"; fi
          
          # Sauvegarde du texte généré pour l'étape suivante
          {
            echo "content<<EOF"
            echo "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release

      - name: Install Typst
        uses: typst-community/setup-typst@v3

      - name: Build user manual
        run: make doc

      - name: Créer ou mettre à jour la release
        id: release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Release automatique après le merge de la PR sur `${{ github.event.pull_request.base.ref }}`.
            
            ${{ steps.changelog.outputs.content }}
          target_commit: ${{ github.event_name == 'create' && github.sha || github.event.pull_request.merge_commit_sha }}
          files: |
            target/release/simeis-server
            doc/manuel_utilisateur.pdf
            doc/swagger.json
            doc/swagger-ui.html