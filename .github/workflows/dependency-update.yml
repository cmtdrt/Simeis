name: Scheduled Rust dependency update

on:
  schedule:
    - cron: "0 15 * * *" # Tous les jours à 15:00 UTC

env:
  # Rajoute des couleurs dans le terminal 
  CARGO_TERM_COLOR: always

permissions:
  # Permissions necessaires pour creer/metre a jour la PR et (eventuellement) creer le label.
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Evite que plusieurs runs se chevauchent.
  # Évite d’avoir plusieurs mises à jour concurrentes (une seule exécution à la fois).
  group: dependency-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Update Cargo.lock files
        id: update_lock
        run: |
          set -euo pipefail

          # Met a jour le Cargo.lock du workspace root (si present).
          cargo update --workspace

          # Met aussi a jour les Cargo.lock des sous-projets qui ont leur propre fichier.
          (cd example/rust && cargo update)
          (cd sdk/rust && cargo update)

      - name: Check if dependencies changed
        id: check
        run: |
          # Si aucun fichier n'a change (git status vide), alors on ne cree pas de PR.
          if [ -z "$(git status --porcelain)" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure label exists
        # On cree le label seulement si on a reellement des changements de dependances.
        if: steps.check.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const label = 'bot/update'
            try {
              // Recupere le label s'il existe deja.
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label
              })
            } catch (e) {
              // S'il n'existe pas, on le cree
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: '1d4ed8',
                  description: 'Automated dependency updates'
                })
              } else {
                throw e
              }
            }

      - name: Create or update dependency PR
        # Ne lance la création/mise à jour de PR que s'il y a eu du changement dans les dependances.
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/dependency-update
          title: "chore: update Rust dependencies"
          body: "Mise à jour automatique des dépendances via `cargo update`."
          commit-message: "chore: update Rust dependencies"
          labels: bot/update

          delete-branch: false

          add-paths: |
            Cargo.lock
            example/rust/Cargo.lock
            sdk/rust/Cargo.lock

