name: Validate TODOs have associated issues
# Vérifie que chaque TODO du code (Rust/Python) référence bien un numéro d'issue GitHub,
# et que cette issue existe et est toujours ouverte.

on:
  workflow_call:

permissions:
  # Nécessaire pour le checkout du dépôt
  contents: read
  # Nécessaire pour lire l'état des issues via `gh issue view`
  issues: read

jobs:
  validate-todos:
    name: Validate TODOs have associated issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate TODOs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Recherche tous les TODOs dans les fichiers Rust et Python, en excluant le dossier de build target/
          todos=$(grep -rn "TODO" --include="*.rs" --include="*.py" . | grep -v "target/")

          if [ -z "$todos" ]; then
            echo "No TODOs found without associated issues."
            exit 0
          fi

          # Regarde si chaque TODO à un numéro d'issue (TODO (#15))
          while IFS= read -r todo; do
            if ! echo "$todo" | grep -qP "TODO \(#\d+\)"; then
              echo "TODO without associated issue found: $todo"
              exit 1
            fi
          done <<< "$todos"

          # Regarde si chaque numéro d'issue référencé existe et est ouvert
          while IFS= read -r todo; do
            issue_number=$(echo "$todo" | grep -oP "TODO \(#\d+\)" | grep -oP "#\d+" | tr -d "#")
            if ! gh issue view "$issue_number" --repo "${{ github.repository }}" --json state -q ".state" | grep -qi "open"; then
              echo "Referenced issue #$issue_number is not open or does not exist for TODO: $todo"
              exit 1
            fi
          done <<< "$todos"

          echo "All TODOs have associated open issues."
          exit 0
