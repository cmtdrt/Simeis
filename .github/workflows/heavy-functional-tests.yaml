name: Heavy Functional Tests

on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'
  workflow_dispatch: {}

jobs:
  heavy-functional-tests:
    name: Heavy Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Simeis server
        run: cargo build --package simeis-server --quiet

      - name: Run functional tests with Simeis server
        run: |
          cargo run --package simeis-server > server.log 2>&1 &
          SERVER_PID=$!

          # Attendre que le serveur réponde réellement
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3333/ping > /dev/null 2>&1; then
              echo "Serveur prêt après ${i}s"
              break
            fi
            echo "Attente... (${i}/30)"
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Timeout : le serveur n'a pas démarré"
              cat server.log
              kill "$SERVER_PID" || true
              exit 1
            fi
          done

          # Lancer les tests fonctionnels
          python -m py_compile tests/functional_test.py
          python tests/functional_test.py
          TEST_EXIT_CODE=$?

          # Toujours afficher les logs serveur pour debug
          echo "--- server.log ---"
          cat server.log

          # Arrêter le serveur proprement
          kill "$SERVER_PID" || true

          exit $TEST_EXIT_CODE