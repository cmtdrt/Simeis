name: Heavy Functional Tests

on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'
  workflow_dispatch: {}

jobs:
  heavy-functional-tests:
    name: Heavy Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Simeis server
        run: cargo build --package simeis-server --quiet

      - name: Start Simeis server in background
        run: |
          setsid cargo run --package simeis-server > server.log 2>&1 < /dev/null &
          disown
          echo $! > server.pid
          # Attendre que le serveur réponde réellement
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3333/ping > /dev/null 2>&1; then
              echo "Serveur prêt après ${i}s"
              exit 0
            fi
            echo "Attente... (${i}/30)"
            sleep 1
          done
          echo "Timeout : le serveur n'a pas démarré"
          cat server.log
          exit 1

      - name: Run functional test script
        run: |
          # Juste avant de lancer les tests Python
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Le serveur est mort avant les tests !"
            cat server.log
            exit 1
          fi

          python -m py_compile tests/functional_test.py
          python tests/functional_test.py

      - name: Stop Simeis server
        # `if: always()` garantit que le serveur est bien arrêté même si l'étape de test précédente a échoué
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi