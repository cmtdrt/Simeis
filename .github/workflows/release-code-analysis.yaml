name: Release Code Analysis
# Fonctionnement du workflow:
# - Sur les branches release/*, lance les tests avec les features "heavy", puis des vérifications
#   de sécurité et d'hygiène du code : cargo-audit (vulnérabilités connues dans les dépendances)
#   et cargo-udeps (dépendances déclarées mais non utilisées, nécessite la toolchain nightly).

on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly

      # --locked garantit qu'on installe exactement les versions verrouillées dans Cargo.lock,
      # pour des résultats reproductibles d'un run à l'autre
      - run: cargo +stable install cargo-audit cargo-udeps --locked
      - run: cargo +stable test --all --features heavy-testing
      - run: cargo +stable build --all --features heavy-testing

      # cargo-audit vérifie les vulnérabilités connues dans les dépendances du projet
      - run: cargo +stable audit

      # cargo-udeps détecte les dépendances déclarées mais non utilisées dans le projet
      - run: cargo +nightly udeps
