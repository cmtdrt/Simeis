name: Release Code Analysis

on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable 
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-audit cargo-udeps --locked
      - run: cargo test --all --features heavy-testing
      - run: cargo build --all --features heavy-testing
      - run: cargo audit
      - run: cargo +nightly udeps
