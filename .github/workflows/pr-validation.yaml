name: PR Validation - Branch Rules
# Fonctionnement du workflow:
# - Valide la règle métier suivante : une PR ciblant une branche release/* ne peut venir
#   que de `main` ou d'une branche `bug/*` (les features doivent d'abord passer par main).
# - Si la règle est respectée, enchaîne sur 3 autres workflows réutilisables (Python, Rust, TODOs).

on:
  pull_request:
    # synchronize : nouveau push sur la PR ; reopened : PR rouverte après fermeture
    types: [opened, synchronize, reopened]

jobs:
  validate-branch:
    name: Validate Branch Rules
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming rules
        run: |
          BASE_BRANCH="${{ github.base_ref }}" # La branche cible de la PR
          HEAD_BRANCH="${{ github.head_ref }}" # La branche source de la PR

          # Si la branche cible est une branche release/*, alors la branche source doit être main ou bug/*
          if [[ "$BASE_BRANCH" == release/* ]]; then
            if [[ "$HEAD_BRANCH" != "main" && "$HEAD_BRANCH" != bug/* ]]; then
              echo "Erreur : Les PRs vers release/* doivent provenir de main ou bug/*"
              exit 1
            fi
          fi
          echo "Nom de branche valide."

  # Les 3 jobs suivants ne se lancent que si validate-branch a réussi, ils 'needs' donc de validate-branch.
  # Pour eviter de lancer des jobs pour rien

  python-checks:
    name: Python Format & Lint
    needs: validate-branch
    uses: ./.github/workflows/check_python_format.yaml

  rust-checks:
    name: Rust Build & Test
    needs: validate-branch
    uses: ./.github/workflows/pr-build-rust.yaml

  todo-validation:
    name: Validate TODOs have associated issues
    needs: validate-branch
    uses: ./.github/workflows/todo_validation.yaml