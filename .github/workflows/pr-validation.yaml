name: PR Validation - Branch Rules

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  # Nécessaire pour le checkout du dépôt
  contents: read
  # Nécessaire pour lire l'état des issues via `gh issue view`
  issues: read

# Ce workflow est déclenché sur chaque PR, et vérifie :
# - que la branche source respecte les règles de nommage (ex. pas de PR vers release/* depuis une branche feature/*)  

jobs:
  validate-branch:
    name: Validate Branch Rules
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming rules
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          if [[ "$BASE_BRANCH" == release/* ]]; then
            if [[ "$HEAD_BRANCH" != "main" && "$HEAD_BRANCH" != bug/* ]]; then
              echo "Erreur : Les PRs vers release/* doivent provenir de main ou bug/*"
              exit 1
            fi
          fi
          echo "Nom de branche valide."

  # Les jobs suivants dépendent de validate-branch, et ne s'exécutent que si la validation de branche réussit grâce au needs.
  python-checks:
    name: Python Format & Lint
    needs: validate-branch
    uses: ./.github/workflows/check_python_format.yaml

  rust-checks:
    name: Rust Build & Test
    needs: validate-branch
    uses: ./.github/workflows/pr-build-rust.yaml

  todo-validation:
    name: Validate TODOs have associated issues
    needs: validate-branch
    uses: ./.github/workflows/todo_validation.yaml