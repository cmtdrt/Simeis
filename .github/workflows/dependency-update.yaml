name: Scheduled Rust dependency update
# Fonctionnement du workflow:
# - Tous les jours on met à jour les Cargo.lock du repo.
# - S'il y a un changement, on ouvre (ou met à jour) une PR automatique portant ces changements.

on:
  workflow_dispatch:
  schedule:
    # Tous les jours a 5 heure UTC.
    - cron: "0 5 * * *"

env:
  # Rajoute des couleurs dans le terminal
  CARGO_TERM_COLOR: always

permissions:
  # Necessaire pour pousser la branche contenant les Cargo.lock mis a jour
  contents: write
  # Necessaire pour creer/mettre a jour la PR
  pull-requests: write
  # Necessaire pour creer le label
  issues: write

concurrency:
  # Evite que plusieurs runs se chevauchent.
  # Évite d’avoir plusieurs mises à jour concurrentes (une seule exécution à la fois).
  group: dependency-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # On met fetch-depth à 0 pour récupérer l'historique complet du dépôt, afin de pouvoir vérifier les changements dans les fichiers Cargo.lock.
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock files
        id: update_lock
        run: |
          set -euo pipefail

          # Met a jour le Cargo.lock du workspace root (si present).
          cargo update --workspace

          # Met aussi a jour les Cargo.lock des sous-projets qui ont leur propre fichier.
          (cd example/rust && cargo update)
          (cd sdk/rust && cargo update)

      - name: Check if dependencies changed
        id: check
        run: |
          # Si aucun fichier n'a change (git status vide), alors on ne cree pas de PR.
          if [ -z "$(git status --porcelain)" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure label exists
        # On cree/met a jour le label seulement si on a reellement des changements de dependances.
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create "bot/update" --color "1d4ed8" --description "Automated dependency updates" --force

      - name: Create or update dependency PR
        # Ne lance la création/mise à jour de PR que s'il y a eu du changement dans les dependances.
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/dependency-update"
          TITLE="chore: update Rust dependencies"
          BODY="Mise à jour automatique des dépendances via \`cargo update\`."

          # Identité utilisée pour le commit automatique
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # On crée (ou réutilise) une branche dédiée, on y commit les Cargo.lock modifiés, et on la pousse
          # en forçant le push pour écraser une éventuelle exécution précédente de cette même branche.
          git checkout -B "$BRANCH"
          git add Cargo.lock example/rust/Cargo.lock sdk/rust/Cargo.lock
          git commit -m "$TITLE"
          git push origin "$BRANCH" --force

          # Si une PR existe déjà pour cette branche, on la met simplement à jour ; sinon on la crée.
          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$BODY" --add-label "bot/update"
          else
            gh pr create --title "$TITLE" --body "$BODY" --head "$BRANCH" --label "bot/update"
          fi