name: Check Python formatting (Ruff)
# Fonctionnement du workflow:
# - Réutilisable via workflow_call (appelé depuis un autre workflow).
# - Vérifie le formatage et le linting du code Python avec Ruff.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  python_format_and_lint:
    name: python_format_and_lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # On installe Python 3.12 pour exécuter Ruff.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # On installe Ruff pour vérifier le formatage du code Python.
      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      # On exécute Ruff pour vérifier le formatage du code Python. Si des problèmes de formatage sont détectés, le workflow échouera.
      - name: Python format (check only)
        run: make py-format
      
      # On exécute le linter Python pour vérifier la qualité du code. Si des problèmes sont détectés, le workflow échouera.
      - name: Python lint
        run: make py-check
